<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>34 - Simon Beat</title><style>body{margin:0;background:#1e293b;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,480px)}.g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}.k{height:100px;border-radius:18px;background:#334155;display:grid;place-items:center;font-size:28px;cursor:pointer}.on{background:#a855f7}button,a{padding:10px 16px;border:0;border-radius:999px;background:#7c3aed;color:#fff;text-decoration:none;cursor:pointer}</style></head><body><main><h2>節奏記憶</h2><div id=s>按開始</div><div class=g id=g></div><button id=st>開始</button> <a href="index.html">返回首頁</a></main><script>const g=document.getElementById("g"),s=document.getElementById("s"),st=document.getElementById("st");let seq=[],ans=[],lock=1;for(let i=0;i<4;i++){const d=document.createElement("div");d.className="k";d.textContent=i+1;d.dataset.i=i;d.onclick=()=>{if(lock)return;blink(i);ans.push(i);if(i!==seq[ans.length-1]){s.textContent="失敗";lock=1}else if(ans.length===seq.length){s.textContent="過關 "+seq.length;setTimeout(next,500)}};g.appendChild(d)}const keys=[...g.children];function blink(i){keys[i].classList.add("on");setTimeout(()=>keys[i].classList.remove("on"),250)}function next(){ans=[];lock=1;seq.push(Math.floor(Math.random()*4));s.textContent="回合 "+seq.length;seq.forEach((v,i)=>setTimeout(()=>blink(v),450*i+200));setTimeout(()=>lock=0,seq.length*450+250)}st.onclick=()=>{seq=[];next()};</script></body></html>
