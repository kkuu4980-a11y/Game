<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>98 - Letter Drop</title><style>body{margin:0;background:#111827;color:#fff;font-family:Consolas,"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.f{position:relative;width:min(92vw,520px);height:60vh;background:#030712;border:2px solid #374151;border-radius:18px;overflow:hidden}.w{position:absolute;color:#a7f3d0;font-size:26px}input{width:min(92vw,520px);padding:14px;border:0;border-radius:14px;font-size:22px;margin-top:12px}a{color:#93c5fd}</style></head><body><div><h2>Letter Drop</h2><div id=s>輸入字母消除，分數 0</div><div class=f id=f></div><input id=i placeholder="輸入字母後按 Enter"><p><a href="index.html">返回首頁</a></p></div><script>const f=document.getElementById("f"),i=document.getElementById("i"),s=document.getElementById("s");let arr=[],n=0;function add(){const d=document.createElement("div"),ch=String.fromCharCode(65+Math.floor(Math.random()*26));d.className="w";d.textContent=ch;d.dataset.v=ch;d.style.left=Math.random()*(f.clientWidth-20)+"px";d.style.top="0px";f.appendChild(d);arr.push(d)}setInterval(add,720);setInterval(()=>{for(const d of arr){d.style.top=(parseFloat(d.style.top)+23)+"px";if(parseFloat(d.style.top)>f.clientHeight-30){s.textContent="98.html 結束";location.reload()}}},280);i.onkeydown=e=>{if(e.key==="Enter"){const v=i.value.trim().toUpperCase();for(const d of arr){if(d.dataset.v===v){d.remove();arr=arr.filter(x=>x!==d);n++;break}}s.textContent="輸入字母消除，分數 "+n;i.value=""}};i.focus();</script></body></html>
