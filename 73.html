<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>73 - Click Order</title><style>body{margin:0;background:#312e81;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.g{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:min(92vw,560px)}.n{height:70px;background:#4f46e5;border-radius:14px;display:grid;place-items:center;font-size:22px;cursor:pointer}a{color:#c7d2fe}</style></head><body><div><h2>Click Order</h2><div id=s>依序點 1 到 20</div><div class=g id=g></div><p><a href="index.html">返回首頁</a></p></div><script>const g=document.getElementById("g"),s=document.getElementById("s");let need=1;[...Array(20)].map((_,i)=>i+1).sort(()=>Math.random()-.5).forEach(v=>{const d=document.createElement("div");d.className="n";d.textContent=v;d.onclick=()=>{if(+d.textContent===need){d.style.visibility="hidden";need++;s.textContent=need<=20?`依序點 ${need} 到 20`:"73.html 完成"}else s.textContent="點錯了"};g.appendChild(d)});</script></body></html>
