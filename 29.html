<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>29 - Jump Run</title><style>body{margin:0;background:#1f2937;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}canvas{background:#111827;border:2px solid #4b5563;border-radius:18px}p{text-align:center}button,a{padding:8px 14px;border:0;border-radius:999px;background:#10b981;color:#fff;text-decoration:none;cursor:pointer}</style></head><body><div><p id=h>空白鍵跳躍，分數 0</p><canvas id=c width=420 height=240></canvas><p><button id=r>重開</button> <a href="index.html">返回首頁</a></p></div><script>const c=document.getElementById("c"),x=c.getContext("2d"),h=document.getElementById("h"),r=document.getElementById("r");let hero,obs,score,run;function reset(){hero={x:50,y:170,w:24,h:24,vy:0};obs=[];score=0;run=1}onkeydown=e=>{if((e.key===" "||e.key==="ArrowUp")&&hero.y>=170)hero.vy=-10};function loop(){requestAnimationFrame(loop);x.clearRect(0,0,c.width,c.height);x.fillStyle="#111827";x.fillRect(0,0,c.width,c.height);x.fillStyle="#374151";x.fillRect(0,194,c.width,6);if(!run)return;x.fillStyle="#34d399";hero.vy+=.5;hero.y+=hero.vy;if(hero.y>170){hero.y=170;hero.vy=0}if(Math.random()<.025)obs.push({x:420,y:174,w:18+Math.random()*20,h:20});for(const o of obs){o.x-=6+score/20;x.fillStyle="#f87171";x.fillRect(o.x,o.y,o.w,o.h);if(hero.x<o.x+o.w&&hero.x+hero.w>o.x&&hero.y<o.y+o.h&&hero.y+hero.h>o.y){run=0;h.textContent+="，失敗"}}x.fillStyle="#34d399";x.fillRect(hero.x,hero.y,hero.w,hero.h);for(let i=obs.length-1;i>=0;i--)if(obs[i].x<-50){obs.splice(i,1);score++}h.textContent="空白鍵跳躍，分數 "+score}reset();r.onclick=reset;loop();</script></body></html>
