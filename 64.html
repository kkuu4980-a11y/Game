<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>64 - Plus Rush</title><style>body{margin:0;background:#172554;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,420px)}input{width:100%;padding:14px;border-radius:14px;border:0;font-size:24px;text-align:center;margin:12px 0}a{color:#bfdbfe}</style></head><body><main><h2>Plus Rush</h2><div id=q></div><input id=i inputmode="numeric" placeholder="輸入答案後按 Enter"><div id=s>分數 0 / 時間 25</div><p><a href="index.html">返回首頁</a></p></main><script>const q=document.getElementById("q"),i=document.getElementById("i"),s=document.getElementById("s");let a,b,ans,n=0,t=25;function next(){a=1+Math.floor(Math.random()*20);b=1+Math.floor(Math.random()*20);ans=a+b;q.textContent=`${a} + ${b} = ?`;i.value=""}next();i.onkeydown=e=>{if(e.key==="Enter"){if(+i.value===ans)n++;s.textContent=`分數 ${n} / 時間 ${t}`;next()}};setInterval(()=>{t--;s.textContent=`分數 ${n} / 時間 ${t}`;if(t<=0){s.textContent=`64.html 完成，分數 ${n}`;i.disabled=1}},1000);</script></body></html>
