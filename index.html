<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html小遊戲天堂</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: "Microsoft JhengHei", sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
        }

        h1 { font-size: 2.5em; margin-bottom: 10px; }
        h2 { margin-top: 40px; color: #f0f6fc; }
        p { color: #8b949e; line-height: 1.6; }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        code {
            background-color: #161b22;
            padding: 2px 6px;
            border-radius: 4px;
            color: #ff7b72;
        }

        #game-list {
            margin: 30px 0;
            padding: 20px;
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
            min-height: 50px;
        }

        .game-link {
            color: #58a6ff;
            text-decoration: none;
            font-family: monospace;
            margin: 0 5px;
            display: inline-block;
            transition: color 0.2s;
        }

        .game-link:hover {
            color: #1f6feb;
            text-decoration: underline;
        }

        .status-tag {
            font-weight: bold;
            color: #3fb950;
            margin-top: 20px;
            display: block;
        }

        .example-url {
            color: #d2a8ff;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>歡迎來到 Html小遊戲天堂</h1>
        <p>在這裡你可以找到各種有趣的 HTML5 遊戲</p>

        <h2>如何遊玩？</h2>
        <p>只需在網址後新增 <code>數字.html</code> 即可遊玩</p>
        
        <p>範例：<span class="example-url" id="example-link">https://game-kk.vercel.app/1.html</span></p>

        <div id="game-list">
            正在掃描遊戲庫...
        </div>

        <span class="status-tag" id="count-display">正在初始化...</span>
        
        <p style="font-size: 0.9em; margin-top: 50px;">
            如果超過總數（例如：<code id="error-ex">15.html</code>）將會報錯，因為沒有這個遊戲，每個遊戲都像在開彩蛋！
        </p>
    </div>

    <script>
        async function autoUpdateGames() {
            const countDisplay = document.getElementById('count-display');
            const gameListDiv = document.getElementById('game-list');
            const errorEx = document.getElementById('error-ex');
            
            let foundCount = 0;
            let checkNext = true;
            let i = 1; // 從 1.html 開始偵測

            // 存儲找到的連結
            let linksHtml = "快速遊玩：";

            while (checkNext) {
                try {
                    // 使用 fetch 偵測檔案是否存在
                    // 注意：這只會偵測 1.html, 2.html... 不會偵測到 index.html
                    const response = await fetch(`${i}.html`, { method: 'HEAD' });
                    
                    if (response.ok) {
                        foundCount = i;
                        linksHtml += `<a class="game-link" href="${i}.html">${i}.html</a> `;
                        i++;
                    } else {
                        checkNext = false;
                    }
                } catch (error) {
                    checkNext = false;
                }
                
                // 防止無限迴圈安全機制 (上限偵測到 200 款)
                if (i > 200) break;
            }

            // 更新顯示文字
            if (foundCount > 0) {
                countDisplay.innerText = `目前共有 ${foundCount} 款遊戲，未來會持續更新更多遊戲，敬請期待！`;
                gameListDiv.innerHTML = linksHtml;
                errorEx.innerText = `${foundCount + 1}.html`;
            } else {
                countDisplay.innerText = `目前還沒有上傳遊戲，請將檔案命名為 1.html 上傳。`;
                gameListDiv.innerHTML = "尚未發現遊戲檔案。";
            }
        }

        // 執行偵測
        autoUpdateGames();
    </script>
</body>
</html>
