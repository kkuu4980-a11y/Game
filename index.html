<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數位武士：遊戲入口網</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0a12;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 掃描線背景效果 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
            z-index: 2;
        }

        .title-section {
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: white;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .subtitle {
            color: var(--neon-pink);
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            width: 100%;
        }

        @media (min-width: 600px) {
            .game-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .game-card.alt:hover {
            border-color: var(--neon-pink);
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .game-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 0.9rem;
            opacity: 0.6;
            line-height: 1.5;
        }

        .status-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.7rem;
            padding: 3px 8px;
            background: var(--neon-blue);
            color: black;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .alt .status-tag {
            background: var(--neon-pink);
        }

        /* 裝飾性裝甲線條 */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-blue);
        }
        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
        .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.8rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-section">
            <h1>Digital Samurai</h1>
            <div class="subtitle">數位武士：核心系統介面</div>
        </div>

        <div class="game-grid">
            <!-- 遊戲一 -->
            <a href="https://game-kk.vercel.app/vm.html" class="game-card">
                <div class="corner top-left"></div>
                <div class="status-tag">Online</div>
                <div class="icon">⚔️</div>
                <div class="game-name">虛擬邊界</div>
                <div class="game-desc">穿越數位防線，挑戰極限重力與空間感。</div>
                <div class="corner bottom-right"></div>
            </a>

            <!-- 遊戲二 -->
            <a href="https://game-kk.vercel.app/combo.html" class="game-card alt">
                <div class="corner top-left" style="border-color: var(--neon-pink)"></div>
                <div class="status-tag">Training</div>
                <div class="icon">⚡</div>
                <div class="game-name">Combo 測試</div>
                <div class="game-desc">精準度與反應速度的最終考驗，挑戰最高同步率。</div>
                <div class="corner bottom-right" style="border-color: var(--neon-pink)"></div>
            </a>
        </div>
    </div>

    <footer>
        &copy; 2024 DIGITAL SAMURAI OPERATIONS. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
