<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>43 - Number Rush</title><style>body{margin:0;background:#1e293b;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,440px)}.g{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}.n{height:96px;background:#334155;border-radius:16px;display:grid;place-items:center;font-size:28px;cursor:pointer}a{color:#cbd5e1}</style></head><body><main><h2>Number Rush</h2><div id=s>按 1 到 9</div><div class=g id=g></div><p><a href="index.html">返回首頁</a></p></main><script>const g=document.getElementById("g"),s=document.getElementById("s");let need=1;[...Array(9)].map((_,i)=>i+1).sort(()=>Math.random()-.5).forEach(v=>{const d=document.createElement("div");d.className="n";d.textContent=v;d.onclick=()=>{if(+d.textContent===need){d.style.visibility="hidden";need++;s.textContent="按 "+need+" 到 9";if(need===10)s.textContent="43.html 完成"}else s.textContent="點錯了";};g.appendChild(d)});</script></body></html>
