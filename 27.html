<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>27 - Catch Stars</title><style>body{margin:0;background:#1e1b4b;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}canvas{background:linear-gradient(#0f172a,#1e1b4b);border-radius:18px;border:2px solid #4338ca}p{text-align:center}a{color:#c4b5fd}</style></head><body><div><p id=h>分數 0，左右移動接星星</p><canvas id=c width=360 height=560></canvas><p><a href="index.html">返回首頁</a></p></div><script>const c=document.getElementById("c"),x=c.getContext("2d"),h=document.getElementById("h"),k={},p={x:140,y:520,w:80,h:16},stars=[];let score=0,t=0;onkeydown=e=>k[e.key]=1;onkeyup=e=>k[e.key]=0;function loop(){requestAnimationFrame(loop);x.clearRect(0,0,c.width,c.height);if(k.ArrowLeft)p.x-=7;if(k.ArrowRight)p.x+=7;p.x=Math.max(0,Math.min(c.width-p.w,p.x));if(++t%30===0)stars.push({x:10+Math.random()*330,y:-10,v:3+score/10});x.fillStyle="#fbbf24";for(const s of stars){s.y+=s.v;x.beginPath();x.arc(s.x,s.y,8,0,7);x.fill();if(s.y>p.y&&s.x>p.x&&s.x<p.x+p.w&&s.y<p.y+p.h){s.y=999;score++;h.textContent="分數 "+score+"，左右移動接星星"}}x.fillStyle="#38bdf8";x.fillRect(p.x,p.y,p.w,p.h);for(let i=stars.length-1;i>=0;i--)if(stars[i].y>580)stars.splice(i,1)}loop();</script></body></html>
