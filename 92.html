<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>92 - Coin Line</title><style>body{margin:0;background:#111827;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}canvas{background:#030712;border:2px solid #374151;border-radius:18px}a{color:#93c5fd}</style></head><body><div><p id=h>左右接金幣，分數 0</p><canvas id=c width=360 height=560></canvas><p><a href="index.html">返回首頁</a></p></div><script>const c=document.getElementById("c"),x=c.getContext("2d"),h=document.getElementById("h"),k={},p={x:140,y:520,w:80,h:16},arr=[];let n=0,t=0;onkeydown=e=>k[e.key]=1;onkeyup=e=>k[e.key]=0;function loop(){requestAnimationFrame(loop);x.clearRect(0,0,360,560);if(k.ArrowLeft)p.x-=7;if(k.ArrowRight)p.x+=7;p.x=Math.max(0,Math.min(c.width-p.w,p.x));if(++t%28===0)arr.push({x:10+Math.random()*330,y:-10,v:3+n/12});x.fillStyle="#fbbf24";for(const o of arr){o.y+=o.v;x.beginPath();x.arc(o.x,o.y,8,0,7);x.fill();if(o.y>p.y&&o.x>p.x&&o.x<p.x+p.w&&o.y<p.y+p.h){o.y=999;n++;h.textContent="左右接金幣，分數 "+n}}x.fillStyle="#34d399";x.fillRect(p.x,p.y,p.w,p.h);for(let i=arr.length-1;i>=0;i--)if(arr[i].y>580)arr.splice(i,1)}loop();</script></body></html>
