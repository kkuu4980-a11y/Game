<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>60 - Memory Flash</title><style>body{margin:0;background:#111827;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.g{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(92vw,320px)}.pad{height:130px;border-radius:20px;opacity:.55;cursor:pointer}.on{opacity:1}.r{background:#ef4444}.g2{background:#22c55e}.b{background:#3b82f6}.y{background:#eab308}a{color:#cbd5e1}</style></head><body><div><h2>Memory Flash 2</h2><div id=s>按開始</div><p><button id=st>開始</button></p><div class=g><div class="pad r" data-i=0></div><div class="pad g2" data-i=1></div><div class="pad b" data-i=2></div><div class="pad y" data-i=3></div></div><p><a href="index.html">返回首頁</a></p></div><script>const pads=[...document.querySelectorAll(".pad")],s=document.getElementById("s");let seq=[],user=[],lock=1;function flash(i){pads[i].classList.add("on");setTimeout(()=>pads[i].classList.remove("on"),350)}function next(){user=[];lock=1;seq.push(Math.floor(Math.random()*4));s.textContent="關卡 "+seq.length;seq.forEach((v,i)=>setTimeout(()=>flash(v),600*i+300));setTimeout(()=>lock=0,seq.length*600+400)}pads.forEach(p=>p.onclick=()=>{if(lock)return;const i=+p.dataset.i;flash(i);user.push(i);if(i!==seq[user.length-1]){s.textContent="失敗";lock=1}else if(user.length===seq.length){if(seq.length===10)s.textContent="60.html 完成";else setTimeout(next,600)}});st.onclick=()=>{seq=[];next()};</script></body></html>
