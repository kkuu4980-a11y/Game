<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>40 - Treasure Hunt</title><style>body{margin:0;background:#052e16;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,520px)}.board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:20px 0}.cell{height:78px;background:#14532d;border-radius:16px;display:grid;place-items:center;font-size:28px;cursor:pointer}button,a{padding:10px 16px;border:0;border-radius:999px;background:#16a34a;color:#fff;text-decoration:none;cursor:pointer}</style></head><body><main><h2>尋寶格子</h2><div id=s>找出 3 個寶箱</div><div class=board id=b></div><button id=st>重排</button> <a href="index.html">返回首頁</a></main><script>const b=document.getElementById("b"),s=document.getElementById("s"),st=document.getElementById("st");let wins=[];function build(){b.innerHTML="";wins=[];while(wins.length<3){const n=Math.floor(Math.random()*25);if(!wins.includes(n))wins.push(n)}let found=0;for(let i=0;i<25;i++){const d=document.createElement("div");d.className="cell";d.textContent="?";d.onclick=()=>{if(d.dataset.o)return;d.dataset.o=1;if(wins.includes(i)){d.textContent="💰";d.style.background="#eab308";found++;if(found===3)s.textContent="40.html 完成"}else{d.textContent="X";d.style.background="#7f1d1d"}};b.appendChild(d)}s.textContent="找出 3 個寶箱"}st.onclick=build;build();</script></body></html>
