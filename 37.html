<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>37 - Type Fall</title><style>body{margin:0;background:#111827;color:#fff;font-family:Consolas,"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,560px)}.field{position:relative;height:65vh;min-height:420px;background:#030712;border:2px solid #374151;border-radius:18px;overflow:hidden}.w{position:absolute;color:#a7f3d0;font-size:26px}input{margin-top:12px;width:100%;padding:14px;border-radius:14px;border:0;font-size:22px}</style></head><body><main><h2>打字接招</h2><div id=s>輸入掉落字母，分數 0</div><div class=field id=f></div><input id=i placeholder="輸入英文字母後按 Enter"><p><a href="index.html" style="color:#fff">返回首頁</a></p></main><script>const f=document.getElementById("f"),i=document.getElementById("i"),s=document.getElementById("s");let arr=[],score=0;function add(){const d=document.createElement("div"),ch=String.fromCharCode(65+Math.floor(Math.random()*26));d.className="w";d.textContent=ch;d.dataset.ch=ch;d.style.left=Math.random()*(f.clientWidth-20)+"px";d.style.top="0px";f.appendChild(d);arr.push(d)}setInterval(add,900);setInterval(()=>{for(const d of arr){d.style.top=(parseFloat(d.style.top)+18)+"px";if(parseFloat(d.style.top)>f.clientHeight-30){s.textContent="37.html 結束";location.reload()}}},300);i.addEventListener("keydown",e=>{if(e.key==="Enter"){const v=i.value.trim().toUpperCase();for(const d of arr){if(d.dataset.ch===v){d.remove();arr=arr.filter(x=>x!==d);score++;break}}s.textContent="輸入掉落字母，分數 "+score;i.value=""}});i.focus();</script></body></html>
