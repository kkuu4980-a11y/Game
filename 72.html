<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>72 - Falling Blocks</title><style>body{margin:0;background:#020617;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}canvas{background:#0f172a;border:2px solid #334155;border-radius:18px}a{color:#93c5fd}</style></head><body><div><p id=h>閃避方塊，存活 0 秒</p><canvas id=c width=360 height=560></canvas><p><a href="index.html">返回首頁</a></p></div><script>const c=document.getElementById("c"),x=c.getContext("2d"),k={},h=document.getElementById("h"),p={x:160,y:510,s:28},arr=[];let n=0,tick=0;onkeydown=e=>k[e.key]=1;onkeyup=e=>k[e.key]=0;function hit(a,b){return a.x<b.x+b.w&&a.x+a.s>b.x&&a.y<b.y+b.h&&a.y+a.s>b.y}function loop(){requestAnimationFrame(loop);x.clearRect(0,0,360,560);if(k.ArrowLeft)p.x-=6;if(k.ArrowRight)p.x+=6;p.x=Math.max(0,Math.min(c.width-p.s,p.x));if(++tick%22===0)arr.push({x:Math.random()*330,y:-18,w:18+Math.random()*28,h:18+Math.random()*28,v:3+n/5});x.fillStyle="#60a5fa";x.fillRect(p.x,p.y,p.s,p.s);x.fillStyle="#fb7185";for(const o of arr){o.y+=o.v;x.fillRect(o.x,o.y,o.w,o.h);if(hit(p,o)){h.textContent=`72.html 結束，存活 ${n.toFixed(1)} 秒`;return}}for(let i=arr.length-1;i>=0;i--)if(arr[i].y>590)arr.splice(i,1);n+=1/60;h.textContent=`閃避方塊，存活 ${n.toFixed(1)} 秒`}loop();</script></body></html>
