<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>30 - Color Match</title><style>body{margin:0;background:#18181b;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,420px)}#word{font-size:64px;font-weight:700;margin:18px 0}.opts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}button,a{padding:14px;border:0;border-radius:16px;color:#fff;font-size:18px;cursor:pointer;text-decoration:none}a{display:inline-block;background:#3f3f46;margin-top:14px}</style></head><body><main><h2>顏色不是文字</h2><div id=s>分數 0 / 時間 20</div><div id=word>紅</div><div class=opts id=o></div><a href="index.html">返回首頁</a></main><script>const names=["紅","藍","綠","黃"],vals=["#ef4444","#3b82f6","#22c55e","#eab308"],word=document.getElementById("word"),o=document.getElementById("o"),s=document.getElementById("s");let answer=0,score=0,time=20;function round(){const text=Math.floor(Math.random()*4);answer=Math.floor(Math.random()*4);word.textContent=names[text];word.style.color=vals[answer]}function draw(){o.innerHTML="";names.forEach((n,i)=>{const b=document.createElement("button");b.textContent=n;b.style.background=vals[i];b.onclick=()=>{if(i===answer)score++;round();s.textContent=`分數 ${score} / 時間 ${time}`};o.appendChild(b)})}draw();round();setInterval(()=>{time--;s.textContent=`分數 ${score} / 時間 ${time}`;if(time<=0){alert("30.html 完成，分數 "+score);location.reload()}},1000);</script></body></html>
