<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>28 - Whack Grid</title><style>body{margin:0;background:#0c4a6e;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,460px)}.g{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}.cell{height:110px;background:#082f49;border-radius:18px;display:grid;place-items:center;font-size:34px;cursor:pointer}.on{background:#f97316}button,a{padding:10px 16px;border:0;border-radius:999px;background:#0369a1;color:#fff;text-decoration:none;cursor:pointer}</style></head><body><main><h2>打地鼠方塊版</h2><div id=s>分數 0 / 時間 20</div><div class=g id=g></div><button id=st>開始</button> <a href="index.html">返回首頁</a></main><script>const g=document.getElementById("g"),s=document.getElementById("s"),st=document.getElementById("st");let score=0,time=20,idx=-1,t1,t2;for(let i=0;i<9;i++){const d=document.createElement("div");d.className="cell";d.textContent="";d.onclick=()=>{if(i===idx){score++;pick();show()}};g.appendChild(d)}const cells=[...g.children];function pick(){cells.forEach(c=>{c.classList.remove("on");c.textContent=""});idx=Math.floor(Math.random()*9);cells[idx].classList.add("on");cells[idx].textContent="!";}function show(){s.textContent=`分數 ${score} / 時間 ${time}`}function start(){score=0;time=20;show();pick();clearInterval(t1);clearInterval(t2);t1=setInterval(pick,700);t2=setInterval(()=>{time--;show();if(time<=0){clearInterval(t1);clearInterval(t2);alert("28.html 完成，分數 "+score)}},1000)}st.onclick=start;</script></body></html>
