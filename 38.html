<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>38 - Sequence Click</title><style>body{margin:0;background:#3b0764;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,520px)}.g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}.n{height:86px;background:#6b21a8;border-radius:16px;display:grid;place-items:center;font-size:28px;cursor:pointer}</style></head><body><main><h2>順序點擊</h2><div id=s>請從 1 點到 16</div><div class=g id=g></div><p><a href="index.html" style="color:#fff">返回首頁</a></p></main><script>const g=document.getElementById("g"),s=document.getElementById("s");let need=1,vals=[...Array(16)].map((_,i)=>i+1).sort(()=>Math.random()-.5);vals.forEach(v=>{const d=document.createElement("div");d.className="n";d.textContent=v;d.onclick=()=>{if(+d.textContent===need){d.style.visibility="hidden";need++;s.textContent="請從 "+need+" 點到 16";if(need===17)s.textContent="38.html 完成"}else{s.textContent="點錯了，重新整理再試"}};g.appendChild(d)});</script></body></html>
