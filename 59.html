<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>59 - Coin Lane</title><style>body{margin:0;background:#0f172a;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}canvas{background:#111827;border:2px solid #334155;border-radius:18px}a{color:#93c5fd}</style></head><body><div><p id=h>左右移動吃金幣，分數 0</p><canvas id=c width=360 height=560></canvas><p><a href="index.html">返回首頁</a></p></div><script>const c=document.getElementById("c"),x=c.getContext("2d"),k={},h=document.getElementById("h"),p={x:160,y:510,w:40,h:40},arr=[];let n=0,t=0;onkeydown=e=>k[e.key]=1;onkeyup=e=>k[e.key]=0;function loop(){requestAnimationFrame(loop);x.clearRect(0,0,360,560);if(k.ArrowLeft)p.x-=6;if(k.ArrowRight)p.x+=6;p.x=Math.max(0,Math.min(c.width-p.w,p.x));if(++t%32===0)arr.push({x:20+Math.random()*320,y:-10,v:3+n/10});x.fillStyle="#fbbf24";for(const o of arr){o.y+=o.v;x.beginPath();x.arc(o.x,o.y,8,0,7);x.fill();if(o.y>p.y&&o.x>p.x&&o.x<p.x+p.w&&o.y<p.y+p.h){o.y=999;n++;h.textContent="左右移動吃金幣，分數 "+n}}x.fillStyle="#60a5fa";x.fillRect(p.x,p.y,p.w,p.h);for(let i=arr.length-1;i>=0;i--)if(arr[i].y>580)arr.splice(i,1)}loop();</script></body></html>
