<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>26 - Memory Flash</title><style>body{margin:0;background:#111827;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,520px)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:20px 0}.pad{height:130px;border-radius:20px;opacity:.55;cursor:pointer}.on{opacity:1;box-shadow:0 0 30px #fff4}.r{background:#ef4444}.g{background:#22c55e}.b{background:#3b82f6}.y{background:#eab308}button,a{padding:10px 16px;border-radius:999px;border:0;background:#2563eb;color:#fff;text-decoration:none;cursor:pointer}</style></head><body><main><h2>記憶閃光</h2><div id=s>關卡 1</div><div class=grid><div class="pad r" data-i=0></div><div class="pad g" data-i=1></div><div class="pad b" data-i=2></div><div class="pad y" data-i=3></div></div><button id=st>開始</button> <a href="index.html">返回首頁</a></main><script>const pads=[...document.querySelectorAll(".pad")],s=document.getElementById("s"),st=document.getElementById("st");let seq=[],user=[],lock=1,lv=1;function flash(i){pads[i].classList.add("on");setTimeout(()=>pads[i].classList.remove("on"),350)}function next(){user=[];lock=1;seq.push(Math.floor(Math.random()*4));s.textContent="關卡 "+seq.length;seq.forEach((v,i)=>setTimeout(()=>flash(v),600*i+300));setTimeout(()=>lock=0,seq.length*600+400)}function reset(){seq=[];lv=1;next()}pads.forEach(p=>p.onclick=()=>{if(lock)return;const i=+p.dataset.i;flash(i);user.push(i);if(i!==seq[user.length-1]){s.textContent="失敗了，再試一次";lock=1}else if(user.length===seq.length){setTimeout(next,600)}});st.onclick=reset;</script></body></html>
