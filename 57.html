<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>57 - Color Match</title><style>body{margin:0;background:#18181b;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.opts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(92vw,420px)}button,a{padding:14px;border:0;border-radius:16px;color:#fff;font-size:18px;cursor:pointer;text-decoration:none}a{display:inline-block;background:#3f3f46;margin-top:14px}#word{font-size:64px;font-weight:700;margin:18px 0}</style></head><body><div><h2>Color Match</h2><div id=s>分數 0 / 時間 20</div><div id=word>紅</div><div class=opts id=o></div><a href="index.html">返回首頁</a></div><script>const names=["紅","藍","綠","黃"],vals=["#ef4444","#3b82f6","#22c55e","#eab308"],word=document.getElementById("word"),o=document.getElementById("o"),s=document.getElementById("s");let ans=0,n=0,t=20;function round(){word.textContent=names[Math.floor(Math.random()*4)];ans=Math.floor(Math.random()*4);word.style.color=vals[ans]}names.forEach((m,i)=>{const b=document.createElement("button");b.textContent=m;b.style.background=vals[i];b.onclick=()=>{if(i===ans)n++;round();s.textContent=`分數 ${n} / 時間 ${t}`};o.appendChild(b)});round();setInterval(()=>{t--;s.textContent=`分數 ${n} / 時間 ${t}`;if(t<=0){s.textContent=`57.html 完成，分數 ${n}`}},1000);</script></body></html>
