<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>77 - Bubble Rush</title><style>body{margin:0;background:#0c4a6e;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.arena{position:relative;width:min(92vw,520px);height:60vh;background:#164e63;border-radius:18px;overflow:hidden}.b{position:absolute;width:60px;height:60px;border-radius:50%;background:#67e8f9;display:grid;place-items:center;color:#083344;font-weight:700;cursor:pointer}a{color:#a5f3fc}</style></head><body><div><h2>Bubble Rush</h2><div id=s>分數 0 / 時間 16</div><div class=arena id=a></div><p><a href="index.html">返回首頁</a></p></div><script>const a=document.getElementById("a"),s=document.getElementById("s");let n=0,t=16;function add(){if(t<=0)return;const d=document.createElement("div");d.className="b";d.textContent="+1";d.style.left=Math.random()*(a.clientWidth-60)+"px";d.style.top=Math.random()*(a.clientHeight-60)+"px";d.onclick=()=>{n++;d.remove();s.textContent=`分數 ${n} / 時間 ${t}`};a.appendChild(d);setTimeout(()=>d.remove(),850)}setInterval(add,340);setInterval(()=>{t--;s.textContent=`分數 ${n} / 時間 ${t}`;if(t<=0)s.textContent=`77.html 完成，分數 ${n}`},1000);</script></body></html>
