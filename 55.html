<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>55 - Bubble Pop</title><style>body{margin:0;background:#082f49;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.arena{position:relative;width:min(92vw,520px);height:60vh;background:#0c4a6e;border-radius:18px;overflow:hidden}.b{position:absolute;width:62px;height:62px;border-radius:50%;display:grid;place-items:center;background:#67e8f9;color:#083344;font-weight:700;cursor:pointer}a{color:#a5f3fc}</style></head><body><div><h2>Bubble Pop 2</h2><div id=s>分數 0 / 時間 20</div><div class=arena id=a></div><p><a href="index.html">返回首頁</a></p></div><script>const a=document.getElementById("a"),s=document.getElementById("s");let n=0,t=20;function add(){if(t<=0)return;const d=document.createElement("div");d.className="b";d.textContent="+1";d.style.left=Math.random()*(a.clientWidth-62)+"px";d.style.top=Math.random()*(a.clientHeight-62)+"px";d.onclick=()=>{n++;s.textContent=`分數 ${n} / 時間 ${t}`;d.remove()};a.appendChild(d);setTimeout(()=>d.remove(),1100)}setInterval(add,420);setInterval(()=>{t--;s.textContent=`分數 ${n} / 時間 ${t}`;if(t<=0)s.textContent=`55.html 完成，分數 ${n}`},1000);</script></body></html>
