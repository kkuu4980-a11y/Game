<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>31 - Math Rush</title><style>body{margin:0;background:#172554;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,420px)}input{width:100%;padding:14px;border-radius:14px;border:0;font-size:24px;text-align:center;margin:12px 0}button,a{padding:10px 16px;border:0;border-radius:999px;background:#2563eb;color:#fff;text-decoration:none;cursor:pointer}</style></head><body><main><h2>算術衝刺</h2><div id=q>0 + 0 = ?</div><input id=i inputmode="numeric" placeholder="輸入答案後按 Enter"><div id=s>分數 0 / 時間 30</div><p><button id=st>開始</button> <a href="index.html">返回首頁</a></p></main><script>const q=document.getElementById("q"),i=document.getElementById("i"),s=document.getElementById("s"),st=document.getElementById("st");let a,b,ans,score=0,time=30,timer;function next(){a=Math.ceil(Math.random()*20);b=Math.ceil(Math.random()*20);ans=a+b;q.textContent=`${a} + ${b} = ?`;i.value="";i.focus()}function start(){score=0;time=30;s.textContent=`分數 ${score} / 時間 ${time}`;next();clearInterval(timer);timer=setInterval(()=>{time--;s.textContent=`分數 ${score} / 時間 ${time}`;if(time<=0){clearInterval(timer);alert("31.html 完成，分數 "+score)}},1000)}i.addEventListener("keydown",e=>{if(e.key==="Enter"){if(+i.value===ans)score++;s.textContent=`分數 ${score} / 時間 ${time}`;next()}});st.onclick=start;</script></body></html>
