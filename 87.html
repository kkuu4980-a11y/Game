<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>87 - Hit Grid</title><style>body{margin:0;background:#164e63;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(92vw,420px)}.c{height:84px;border-radius:14px;background:#083344;display:grid;place-items:center;cursor:pointer}.on{background:#f97316}a{color:#a5f3fc}</style></head><body><div><h2>Hit Grid</h2><div id=s>分數 0 / 時間 18</div><div class=g id=g></div><p><a href="index.html">返回首頁</a></p></div><script>const g=document.getElementById("g"),s=document.getElementById("s");let n=0,t=18,idx=-1;for(let i=0;i<16;i++){const d=document.createElement("div");d.className="c";d.onclick=()=>{if(i===idx){n++;pick();show()}};g.appendChild(d)}const arr=[...g.children];function pick(){arr.forEach(x=>x.classList.remove("on"));idx=Math.floor(Math.random()*16);arr[idx].classList.add("on")}function show(){s.textContent=`分數 ${n} / 時間 ${t}`}pick();show();setInterval(()=>{t--;pick();show();if(t<=0)s.textContent=`87.html 完成，分數 ${n}`},1000);</script></body></html>
