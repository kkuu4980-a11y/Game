<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>75 - Match Pair</title><style>body{margin:0;background:#431407;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(92vw,520px)}.c{height:88px;border-radius:16px;background:#1f2937;display:grid;place-items:center;font-size:28px;cursor:pointer}.open{background:#f59e0b}.done{background:#22c55e}a{color:#fdba74}</style></head><body><div><h2>Match Pair</h2><div id=s>配對全部卡片</div><div class=g id=g></div><p><a href="index.html">返回首頁</a></p></div><script>const g=document.getElementById("g"),s=document.getElementById("s");let vals=["A","A","B","B","C","C","D","D","E","E","F","F","G","G","H","H"].sort(()=>Math.random()-.5),pick=[],done=0;vals.forEach(v=>{const d=document.createElement("div");d.className="c";d.onclick=()=>{if(d.classList.contains("done")||pick.includes(d)||pick.length===2)return;d.textContent=v;d.classList.add("open");pick.push(d);if(pick.length===2)setTimeout(()=>{if(pick[0].textContent===pick[1].textContent){pick.forEach(x=>{x.classList.add("done");x.classList.remove("open")});done+=2;if(done===16)s.textContent="75.html 完成"}else pick.forEach(x=>{x.textContent="";x.classList.remove("open")});pick=[]},500)};g.appendChild(d)});</script></body></html>
