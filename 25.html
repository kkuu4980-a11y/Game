<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>25 - Dodge Box</title><style>body{margin:0;background:#020617;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}canvas{background:#0f172a;border:2px solid #334155;border-radius:18px}p{text-align:center}a{color:#93c5fd}</style></head><body><div><p id=h>存活:0 秒，方向鍵移動</p><canvas id=c width=360 height=560></canvas><p><a href="index.html">返回首頁</a></p></div><script>const c=document.getElementById("c"),x=c.getContext("2d"),h=document.getElementById("h"),k={},p={x:160,y:500,s:28},obs=[];let last=0,alive=0,run=1;onkeydown=e=>k[e.key]=1;onkeyup=e=>k[e.key]=0;function add(){obs.push({x:Math.random()*320,y:-30,w:20+Math.random()*45,h:20+Math.random()*45,v:3+alive/6})}function hit(a,b){return a.x<b.x+b.w&&a.x+a.s>b.x&&a.y<b.y+b.h&&a.y+a.s>b.y}function loop(t){if(!run)return;requestAnimationFrame(loop);if(t-last>500){add();last=t}if(k.ArrowLeft)p.x-=6;if(k.ArrowRight)p.x+=6;if(k.ArrowUp)p.y-=6;if(k.ArrowDown)p.y+=6;p.x=Math.max(0,Math.min(c.width-p.s,p.x));p.y=Math.max(0,Math.min(c.height-p.s,p.y));x.clearRect(0,0,c.width,c.height);x.fillStyle="#1e293b";x.fillRect(0,0,c.width,c.height);alive+=1/60;h.textContent="存活:"+alive.toFixed(1)+" 秒，方向鍵移動";x.fillStyle="#38bdf8";x.fillRect(p.x,p.y,p.s,p.s);x.fillStyle="#f87171";for(const o of obs){o.y+=o.v;x.fillRect(o.x,o.y,o.w,o.h);if(hit(p,o)){run=0;h.textContent+="，遊戲結束";}}for(let i=obs.length-1;i>=0;i--)if(obs[i].y>620)obs.splice(i,1)}loop(0);</script></body></html>
