<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹切分音：數位武士</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --bg-dark: #050505;
        }
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'PingFang TC', sans-serif;
            touch-action: none;
        }
        canvas { display: block; }

        #ui-layer {
            position: absolute; inset: 0;
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .header { display: flex; justify-content: space-between; font-size: 1.2rem; }
        .combo-meter {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem; font-weight: 900;
            opacity: 0.1; transition: 0.1s;
        }

        #start-screen, #game-over {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; pointer-events: auto;
        }

        .btn-start {
            background: transparent; color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 15px 40px; font-size: 1.5rem;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px var(--neon-blue);
        }
        .btn-start:hover { background: var(--neon-blue); color: black; }

        @keyframes slash-anim {
            0% { transform: scaleX(0); opacity: 1; }
            100% { transform: scaleX(1); opacity: 0; }
        }
        .slash-effect {
            position: absolute; height: 4px; background: white;
            box-shadow: 0 0 10px white, 0 0 20px var(--neon-pink);
            pointer-events: none; transform-origin: left center;
            animation: slash-anim 0.2s ease-out forwards;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color: var(--neon-pink); font-size: 2.5rem; margin-bottom: 10px;">數位武士</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">在敵人進入核心圈時點擊螢幕</p>
        <button class="btn-start" onclick="startGame()">開始執行</button>
    </div>

    <div id="game-over" style="display: none;">
        <h1 style="color: var(--danger);">系統崩潰</h1>
        <p id="final-score"></p>
        <button class="btn-start" onclick="location.reload()">重新啟動</button>
    </div>

    <div id="ui-layer">
        <div class="header">
            <div>同步率: <span id="sync-rate" style="color: var(--neon-blue);">0%</span></div>
            <div>HP: <span id="hp" style="color: var(--neon-pink);">100</span></div>
        </div>
        <div id="combo-text" class="combo-meter">0</div>
        <div style="text-align: center; opacity: 0.5; font-size: 0.8rem;">精準打擊以維持同步</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = 'START';
        let score = 0;
        let combo = 0;
        let hp = 100;
        let enemies = [];
        let particles = [];
        let spawnRate = 1500;
        let lastSpawn = 0;
        let coreRadius = 50;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameState = 'PLAYING';
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
            e.preventDefault();
        });

        function handleInput(tx, ty) {
            if (gameState !== 'PLAYING') return;

            createSlash(tx, ty);
            let hit = false;
            
            // 檢查是否擊中靠近核心的敵人
            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i];
                const dist = Math.sqrt((en.x - canvas.width/2)**2 + (en.y - canvas.height/2)**2);
                
                // 擊中判定範圍 (在核心圈附近)
                if (dist < 120 && dist > 30) {
                    enemies.splice(i, 1);
                    hit = true;
                    score += 10 + combo;
                    combo++;
                    createExplosion(en.x, en.y, varColor());
                    break;
                }
            }

            if (!hit) {
                combo = 0;
                hp -= 2;
            }
            updateUI();
        }

        function createSlash(tx, ty) {
            const el = document.createElement('div');
            el.className = 'slash-effect';
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const angle = Math.atan2(ty - centerY, tx - centerX);
            const dist = 200;
            
            el.style.left = centerX + 'px';
            el.style.top = centerY + 'px';
            el.style.width = dist + 'px';
            el.style.transform = `rotate(${angle}刻)`; // 其實是用 rad
            el.style.transform = `rotate(${angle}rad)`;
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 200);
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function varColor() {
            return Math.random() > 0.5 ? '#00f2ff' : '#ff00ff';
        }

        function spawnEnemy() {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.max(canvas.width, canvas.height) * 0.6;
            enemies.push({
                x: canvas.width/2 + Math.cos(angle) * dist,
                y: canvas.height/2 + Math.sin(angle) * dist,
                speed: 2 + (score / 500),
                size: 20
            });
        }

        function updateUI() {
            document.getElementById('sync-rate').innerText = score;
            document.getElementById('hp').innerText = hp;
            const ct = document.getElementById('combo-text');
            ct.innerText = combo;
            ct.style.opacity = Math.min(0.5, combo / 20);
            
            if (hp <= 0) {
                gameState = 'OVER';
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('final-score').innerText = `最終同步率: ${score}`;
            }
        }

        function gameLoop(time) {
            if (gameState !== 'PLAYING') return;

            if (time - lastSpawn > spawnRate) {
                spawnEnemy();
                lastSpawn = time;
                spawnRate = Math.max(400, 1500 - (score / 10));
            }

            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製中心核心
            ctx.strokeStyle = combo > 10 ? varColor() : '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, coreRadius, 0, Math.PI * 2);
            ctx.stroke();

            // 繪製打擊判定圈 (提示玩家在哪裡點擊)
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 100, 0, Math.PI * 2);
            ctx.stroke();

            // 更新並繪製敵人
            ctx.fillStyle = varColor();
            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i];
                const dx = canvas.width/2 - en.x;
                const dy = canvas.height/2 - en.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                en.x += (dx / dist) * en.speed;
                en.y += (dy / dist) * en.speed;

                ctx.fillRect(en.x - 10, en.y - 10, 20, 20);

                if (dist < coreRadius) {
                    enemies.splice(i, 1);
                    hp -= 10;
                    combo = 0;
                    updateUI();
                }
            }

            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 4, 4);
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
