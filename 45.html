<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>45 - Light Memory</title><style>body{margin:0;background:#111827;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.g{display:grid;grid-template-columns:repeat(2,140px);gap:14px}.p{height:140px;border-radius:22px;opacity:.55;cursor:pointer}.on{opacity:1}.a{background:#ef4444}.b{background:#22c55e}.c{background:#3b82f6}.d{background:#f59e0b}a{color:#cbd5e1}</style></head><body><div><h2>Light Memory</h2><div id=s>按開始</div><p><button id=st>開始</button></p><div class=g><div class="p a" data-i=0></div><div class="p b" data-i=1></div><div class="p c" data-i=2></div><div class="p d" data-i=3></div></div><p><a href="index.html">返回首頁</a></p></div><script>const pads=[...document.querySelectorAll(".p")],s=document.getElementById("s");let seq=[],pick=[],lock=1;function flash(i){pads[i].classList.add("on");setTimeout(()=>pads[i].classList.remove("on"),320)}function next(){pick=[];lock=1;seq.push(Math.floor(Math.random()*4));s.textContent="回合 "+seq.length;seq.forEach((v,i)=>setTimeout(()=>flash(v),520*i+250));setTimeout(()=>lock=0,seq.length*520+250)}pads.forEach(p=>p.onclick=()=>{const i=+p.dataset.i;if(lock)return;flash(i);pick.push(i);if(i!==seq[pick.length-1]){s.textContent="失敗";lock=1}else if(pick.length===seq.length){if(seq.length===8)s.textContent="45.html 完成";else setTimeout(next,500)}});st.onclick=()=>{seq=[];next()};</script></body></html>
