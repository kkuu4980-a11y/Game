<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>39 - Balance Bar</title><style>body{margin:0;background:#1c1917;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,520px)}.track{height:34px;background:#44403c;border-radius:999px;overflow:hidden;margin:20px 0}.bar{height:100%;width:50%;background:#22c55e;transition:.08s linear}button,a{padding:10px 16px;border:0;border-radius:999px;background:#78716c;color:#fff;text-decoration:none;cursor:pointer}</style></head><body><main><h2>平衡條</h2><div id=s>按左 A / 右 L 維持在中間 15 秒</div><div class=track><div class=bar id=b></div></div><button id=st>開始</button> <a href="index.html">返回首頁</a></main><script>const b=document.getElementById("b"),s=document.getElementById("s"),st=document.getElementById("st");let v=50,t=15,run=0,timer;function draw(){b.style.width=v+"%";b.style.background=v>35&&v<65?"#22c55e":"#ef4444"}onkeydown=e=>{if(!run)return;if(e.key.toLowerCase()==="a")v-=4;if(e.key.toLowerCase()==="l")v+=4;draw()};function start(){v=50;t=15;run=1;draw();clearInterval(timer);timer=setInterval(()=>{v+=Math.random()*10-5;draw();t-=.2;s.textContent=`按左 A / 右 L 維持在中間 ${Math.max(0,t).toFixed(1)} 秒`;if(v<=0||v>=100){run=0;clearInterval(timer);s.textContent="39.html 失敗"}if(t<=0){run=0;clearInterval(timer);s.textContent="39.html 完成"}},200)}st.onclick=start;</script></body></html>
