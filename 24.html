<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>24 - Target Tap</title><style>body{margin:0;background:#0f172a;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}main{width:min(92vw,520px);text-align:center}.arena{position:relative;height:65vh;min-height:420px;background:#111827;border:2px solid #334155;border-radius:18px;overflow:hidden}.ball{position:absolute;width:72px;height:72px;border-radius:50%;background:#22c55e;cursor:pointer;box-shadow:0 0 30px #22c55e88}.hud{display:flex;justify-content:space-between;margin:0 0 12px}.btn,a{display:inline-block;margin-top:14px;padding:10px 16px;border-radius:999px;background:#2563eb;color:#fff;text-decoration:none;border:0;cursor:pointer}</style></head><body><main><div class="hud"><b id=s>分數:0</b><b id=t>時間:20</b></div><div class="arena" id=a><div class="ball" id=b></div></div><button class="btn" id=r>重新開始</button> <a href="index.html">返回首頁</a></main><script>const a=x=>document.getElementById(x),arena=a("a"),ball=a("b"),score=a("s"),time=a("t"),reset=a("r");let n=0,left=20,timer;function place(){ball.style.left=Math.random()*(arena.clientWidth-72)+"px";ball.style.top=Math.random()*(arena.clientHeight-72)+"px"}function start(){n=0;left=20;score.textContent="分數:"+n;time.textContent="時間:"+left;place();clearInterval(timer);timer=setInterval(()=>{left--;time.textContent="時間:"+left;if(left<=0){clearInterval(timer);ball.style.display="none";alert("24.html 完成，得分 "+n)}},1000);ball.style.display="block"}ball.onclick=()=>{if(left>0){n++;score.textContent="分數:"+n;place()}};reset.onclick=start;start();</script></body></html>
