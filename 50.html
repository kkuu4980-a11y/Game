<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>50 - Balance Bar</title><style>body{margin:0;background:#1c1917;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,520px)}.track{height:36px;background:#44403c;border-radius:999px;overflow:hidden;margin:20px 0}.bar{height:100%;width:50%;background:#22c55e}a{color:#fde68a}</style></head><body><main><h2>Balance Bar</h2><div id=s>A / L 保持在中間</div><div class=track><div class=bar id=b></div></div><p><a href="index.html">返回首頁</a></p></main><script>const b=document.getElementById("b"),s=document.getElementById("s");let v=50,t=15,run=1;function draw(){b.style.width=v+"%";b.style.background=v>35&&v<65?"#22c55e":"#ef4444"}draw();onkeydown=e=>{if(!run)return;if(e.key.toLowerCase()==="a")v-=4;if(e.key.toLowerCase()==="l")v+=4;draw()};setInterval(()=>{if(!run)return;v+=Math.random()*10-5;draw();t-=.2;s.textContent=`A / L 保持在中間 ${Math.max(0,t).toFixed(1)} 秒`;if(v<=0||v>=100){run=0;s.textContent="50.html 失敗"}if(t<=0){run=0;s.textContent="50.html 完成"}},200);</script></body></html>
