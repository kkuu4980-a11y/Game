<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>54 - Maze Walk</title><style>body{margin:0;background:#064e3b;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}table{border-collapse:collapse}td{width:26px;height:26px}._{background:#d1fae5}.w{background:#022c22}.p{background:#38bdf8}.e{background:#f59e0b}a{color:#bbf7d0}</style></head><body><div><h2>Maze Walk 2</h2><div id=s>走到終點</div><table id=m></table><p><a href="index.html">返回首頁</a></p></div><script>const map=["111111111111","100000000001","101111111101","101000001101","101011101101","101010001101","101011111101","101000000001","101111111101","100000000001","111111111111"],m=document.getElementById("m"),s=document.getElementById("s");let p={x:1,y:1},e={x:10,y:9};function draw(){m.innerHTML="";map.forEach((r,y)=>{const tr=document.createElement("tr");[...r].forEach((v,x)=>{const td=document.createElement("td");td.className=v==="1"?"w":"_";if(x===p.x&&y===p.y)td.className="p";if(x===e.x&&y===e.y)td.className="e";tr.appendChild(td)});m.appendChild(tr)})}onkeydown=z=>{const d={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1]}[z.key];if(!d)return;const nx=p.x+d[0],ny=p.y+d[1];if(map[ny][nx]==="0"){p={x:nx,y:ny};draw();if(nx===e.x&&ny===e.y)s.textContent="54.html 完成"}};draw();</script></body></html>
