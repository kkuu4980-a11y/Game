<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>36 - Bubble Pop</title><style>body{margin:0;background:#082f49;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}main{width:min(92vw,520px)}.arena{position:relative;height:65vh;min-height:420px;background:#0c4a6e;border-radius:18px;overflow:hidden}.b{position:absolute;width:64px;height:64px;border-radius:50%;display:grid;place-items:center;background:#67e8f9;color:#083344;font-weight:700;cursor:pointer}button,a{padding:10px 16px;border:0;border-radius:999px;background:#06b6d4;color:#fff;text-decoration:none;cursor:pointer}</style></head><body><main><h2>泡泡狂點</h2><div id=s>分數 0 / 時間 20</div><div class=arena id=a></div><p><button id=st>開始</button> <a href="index.html">返回首頁</a></p></main><script>const a=document.getElementById("a"),s=document.getElementById("s"),st=document.getElementById("st");let score=0,time=20,t1,t2;function spawn(){const d=document.createElement("div");d.className="b";d.textContent="+1";d.style.left=Math.random()*(a.clientWidth-64)+"px";d.style.top=Math.random()*(a.clientHeight-64)+"px";d.onclick=()=>{score++;s.textContent=`分數 ${score} / 時間 ${time}`;d.remove()};a.appendChild(d);setTimeout(()=>d.remove(),1200)}function start(){a.innerHTML="";score=0;time=20;s.textContent=`分數 ${score} / 時間 ${time}`;clearInterval(t1);clearInterval(t2);t1=setInterval(spawn,450);t2=setInterval(()=>{time--;s.textContent=`分數 ${score} / 時間 ${time}`;if(time<=0){clearInterval(t1);clearInterval(t2);alert("36.html 完成，分數 "+score)}},1000)}st.onclick=start;</script></body></html>
