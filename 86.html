<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>86 - Mini Runner</title><style>body{margin:0;background:#1f2937;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}canvas{background:#111827;border:2px solid #4b5563;border-radius:18px}a{color:#cbd5e1}</style></head><body><div><p id=h>空白鍵跳躍，分數 0</p><canvas id=c width=420 height=220></canvas><p><a href="index.html">返回首頁</a></p></div><script>const c=document.getElementById("c"),x=c.getContext("2d"),h=document.getElementById("h");let p={x:50,y:150,w:24,h:24,vy:0},arr=[],n=0,run=1;onkeydown=e=>{if((e.key===" "||e.key==="ArrowUp")&&p.y>=150)p.vy=-10};function loop(){requestAnimationFrame(loop);x.clearRect(0,0,420,220);x.fillStyle="#111827";x.fillRect(0,0,420,220);x.fillStyle="#374151";x.fillRect(0,176,420,6);if(!run)return;p.vy+=.5;p.y+=p.vy;if(p.y>150){p.y=150;p.vy=0}if(Math.random()<.028)arr.push({x:420,w:16+Math.random()*22,h:18,y:158});for(const o of arr){o.x-=6+n/15;x.fillStyle="#f87171";x.fillRect(o.x,o.y,o.w,o.h);if(p.x<o.x+o.w&&p.x+p.w>o.x&&p.y<o.y+o.h&&p.y+p.h>o.y){run=0;h.textContent="86.html 結束，分數 "+n}}x.fillStyle="#34d399";x.fillRect(p.x,p.y,p.w,p.h);for(let i=arr.length-1;i>=0;i--)if(arr[i].x<-50){arr.splice(i,1);n++;h.textContent="空白鍵跳躍，分數 "+n}}loop();</script></body></html>
