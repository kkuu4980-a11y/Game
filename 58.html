<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>58 - Brick Break</title><style>body{margin:0;background:#0f172a;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}canvas{background:#111827;border:2px solid #475569;border-radius:18px}a{color:#93c5fd}</style></head><body><div><p id=h>滑鼠接球，磚塊 12</p><canvas id=c width=420 height=500></canvas><p><a href="index.html">返回首頁</a></p></div><script>const c=document.getElementById("c"),x=c.getContext("2d"),h=document.getElementById("h"),pad={x:160,y:470,w:90,h:12},ball={x:210,y:250,vx:4,vy:4,r:8},br=[];for(let y=0;y<3;y++)for(let i=0;i<4;i++)br.push({x:30+i*95,y:40+y*36,w:70,h:20,on:1});c.onmousemove=e=>{const r=c.getBoundingClientRect();pad.x=Math.max(0,Math.min(c.width-pad.w,e.clientX-r.left-pad.w/2))};function loop(){requestAnimationFrame(loop);x.clearRect(0,0,c.width,c.height);x.fillStyle="#38bdf8";x.fillRect(pad.x,pad.y,pad.w,pad.h);ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x<ball.r||ball.x>c.width-ball.r)ball.vx*=-1;if(ball.y<ball.r)ball.vy*=-1;if(ball.y>c.height){h.textContent="58.html 失敗";return}if(ball.y+ball.r>pad.y&&ball.x>pad.x&&ball.x<pad.x+pad.w)ball.vy=-Math.abs(ball.vy);x.fillStyle="#fff";x.beginPath();x.arc(ball.x,ball.y,ball.r,0,7);x.fill();let left=0;for(const b of br){if(!b.on)continue;left++;x.fillStyle="#f97316";x.fillRect(b.x,b.y,b.w,b.h);if(ball.x>b.x&&ball.x<b.x+b.w&&ball.y-ball.r<b.y+b.h&&ball.y+ball.r>b.y){b.on=0;ball.vy*=-1}}h.textContent="滑鼠接球，磚塊 "+left;if(!left){h.textContent="58.html 完成";return}}loop();</script></body></html>
