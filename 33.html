<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>33 - Maze Walk</title><style>body{margin:0;background:#064e3b;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}table{border-collapse:collapse}td{width:26px;height:26px}._{background:#d1fae5}.w{background:#022c22}.p{background:#38bdf8}.e{background:#f59e0b}</style></head><body><div><h2>小迷宮</h2><div id=s>方向鍵移動到金色終點</div><table id=m></table><p><a href="index.html" style="color:#fff">返回首頁</a></p></div><script>const map=["1111111111","1000000001","1011111101","1010000101","1010110101","1010100101","1010101101","1000100001","1011111101","1000000001","1111111111"],m=document.getElementById("m"),s=document.getElementById("s");let p={x:1,y:1},end={x:8,y:9};function draw(){m.innerHTML="";map.forEach((row,y)=>{const tr=document.createElement("tr");[...row].forEach((v,x)=>{const td=document.createElement("td");td.className=v==="1"?"w":"_";if(x===p.x&&y===p.y)td.className="p";if(x===end.x&&y===end.y)td.className="e";tr.appendChild(td)});m.appendChild(tr)})}onkeydown=e=>{const d={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1]}[e.key];if(!d)return;const nx=p.x+d[0],ny=p.y+d[1];if(map[ny][nx]==="0"){p={x:nx,y:ny};draw();if(nx===end.x&&ny===end.y)s.textContent="33.html 完成"}};draw();</script></body></html>
