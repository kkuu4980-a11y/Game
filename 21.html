<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>脈衝節點 - Pulse Link</title>
    <style>
        body {
            margin: 0;
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 40px;
            text-align: center;
            pointer-events: none;
        }

        #score {
            font-size: 64px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
        }

        canvas {
            background-color: #0d1117;
        }

        #overlay {
            position: absolute;
            background: rgba(13, 17, 23, 0.95);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .btn {
            background: none;
            border: 1px solid #58a6ff;
            color: #58a6ff;
            padding: 12px 40px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #58a6ff;
            color: #0d1117;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.4);
        }

        h1 { font-size: 32px; letter-spacing: 5px; margin-bottom: 10px; color: #f0f6fc; }
        p { margin-bottom: 30px; color: #8b949e; }

        .back {
            position: absolute;
            bottom: 30px;
            color: #30363d;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back:hover { color: #8b949e; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <h1 id="m-title">PULSE LINK</h1>
        <p id="m-desc">當指針對準圓點時，點擊畫面連接</p>
        <button class="btn" onclick="start()">INITIATE</button>
        <a href="index.html" class="back">RETURN TO HUB</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const mTitle = document.getElementById('m-title');
        const mDesc = document.getElementById('m-desc');

        let isRunning = false;
        let score = 0;
        let angle = 0;
        let rotationSpeed = 0.05;
        let nodes = [];
        let radius = 120;
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            radius = Math.min(canvas.width, canvas.height) * 0.35;
        }

        window.addEventListener('resize', init);

        function spawnNode() {
            const nodeAngle = Math.random() * Math.PI * 2;
            nodes.push({
                angle: nodeAngle,
                active: true,
                pulse: 0
            });
        }

        function start() {
            score = 0;
            nodes = [];
            rotationSpeed = 0.05;
            angle = 0;
            isRunning = true;
            scoreEl.innerText = score;
            overlay.style.display = 'none';
            spawnNode();
            animate();
        }

        function gameOver() {
            isRunning = false;
            overlay.style.display = 'flex';
            mTitle.innerText = "LINK SEVERED";
            mTitle.style.color = "#ff7b72";
            mDesc.innerText = `最終同步分數: ${score}`;
        }

        // 核心判斷：點擊時檢查指針與節點的角度差
        function checkLink() {
            if (!isRunning) return;

            let hit = false;
            const normalizedAngle = ((angle % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2);

            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                let diff = Math.abs(normalizedAngle - node.angle);
                if (diff > Math.PI) diff = Math.PI * 2 - diff;

                if (diff < 0.25) { // 判斷區間
                    hit = true;
                    nodes.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    rotationSpeed += 0.002 * (Math.random() > 0.5 ? 1 : -1); // 隨機改變一點速度
                    if (Math.abs(rotationSpeed) < 0.03) rotationSpeed = 0.05; // 速度保底
                    
                    // 噴射粒子效果
                    createExplosion(
                        canvas.width/2 + Math.cos(node.angle) * radius,
                        canvas.height/2 + Math.sin(node.angle) * radius
                    );

                    spawnNode();
                    if (score % 5 === 0) spawnNode(); // 每5分多一個點增加難度
                    break;
                }
            }

            if (!hit) {
                gameOver();
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 1.0
                });
            }
        }

        window.addEventListener('mousedown', (e) => { if(e.button === 0) checkLink(); });
        window.addEventListener('touchstart', (e) => { e.preventDefault(); checkLink(); }, {passive: false});

        function animate() {
            if (!isRunning) return;
            requestAnimationFrame(animate);

            ctx.fillStyle = 'rgba(13, 17, 23, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // 1. 畫中心圓與軌道
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.strokeStyle = '#161b22';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 2. 畫節點
            nodes.forEach(node => {
                const nx = cx + Math.cos(node.angle) * radius;
                const ny = cy + Math.sin(node.angle) * radius;
                
                node.pulse += 0.1;
                const s = 8 + Math.sin(node.pulse) * 3;

                ctx.fillStyle = '#58a6ff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#58a6ff';
                ctx.beginPath();
                ctx.arc(nx, ny, s, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // 3. 畫旋轉指針
            angle += rotationSpeed;
            const px = cx + Math.cos(angle) * radius;
            const py = cy + Math.sin(angle) * radius;

            ctx.strokeStyle = '#f0f6fc';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(px, py);
            ctx.stroke();

            // 4. 更新粒子
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
                ctx.fillStyle = `rgba(88, 166, 255, ${p.life})`;
                ctx.fillRect(p.x, p.y, 2, 2);
            });
        }

        init();
    </script>
</body>
</html>
