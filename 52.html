<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>52 - Dodge Red</title><style>body{margin:0;background:#020617;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh}canvas{background:#0f172a;border:2px solid #334155;border-radius:18px}a{color:#93c5fd}</style></head><body><div><p id=h>й–ғзҙ…еЎҠпјҢеӯҳжҙ» 0 з§’</p><canvas id=c width=360 height=560></canvas><p><a href="index.html">иҝ”еӣһйҰ–й Ғ</a></p></div><script>const c=document.getElementById("c"),x=c.getContext("2d"),h=document.getElementById("h"),k={},p={x:160,y:500,s:28},arr=[];let t=0,last=0,run=1;onkeydown=e=>k[e.key]=1;onkeyup=e=>k[e.key]=0;function hit(a,b){return a.x<b.x+b.w&&a.x+a.s>b.x&&a.y<b.y+b.h&&a.y+a.s>b.y}function loop(T){if(!run)return;requestAnimationFrame(loop);if(T-last>520){arr.push({x:Math.random()*320,y:-30,w:18+Math.random()*38,h:18+Math.random()*38,v:3+t/7});last=T}if(k.ArrowLeft)p.x-=6;if(k.ArrowRight)p.x+=6;if(k.ArrowUp)p.y-=6;if(k.ArrowDown)p.y+=6;p.x=Math.max(0,Math.min(c.width-p.s,p.x));p.y=Math.max(0,Math.min(c.height-p.s,p.y));x.clearRect(0,0,360,560);x.fillStyle="#38bdf8";x.fillRect(p.x,p.y,p.s,p.s);x.fillStyle="#f87171";for(const o of arr){o.y+=o.v;x.fillRect(o.x,o.y,o.w,o.h);if(hit(p,o)){run=0;h.textContent=`52.html зөҗжқҹпјҢеӯҳжҙ» ${t.toFixed(1)} з§’`}}for(let i=arr.length-1;i>=0;i--)if(arr[i].y>620)arr.splice(i,1);t+=1/60;h.textContent=`й–ғзҙ…еЎҠпјҢеӯҳжҙ» ${t.toFixed(1)} з§’`}loop(0);</script></body></html>
