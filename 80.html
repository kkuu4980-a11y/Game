<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>80 - Stay Center</title><style>body{margin:0;background:#1c1917;color:#fff;font-family:"Microsoft JhengHei",sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center}.track{height:36px;background:#44403c;border-radius:999px;overflow:hidden;margin:20px auto;width:min(92vw,520px)}.bar{height:100%;width:50%;background:#22c55e}a{color:#fde68a}</style></head><body><div><h2>Stay Center</h2><div id=s>按 J / L 維持中央 14 秒</div><div class=track><div class=bar id=b></div></div><p><a href="index.html">返回首頁</a></p></div><script>const b=document.getElementById("b"),s=document.getElementById("s");let v=50,t=14,run=1;function draw(){b.style.width=v+"%";b.style.background=v>35&&v<65?"#22c55e":"#ef4444"}draw();onkeydown=e=>{if(!run)return;if(e.key.toLowerCase()==="j")v-=4;if(e.key.toLowerCase()==="l")v+=4;draw()};setInterval(()=>{if(!run)return;v+=Math.random()*12-6;draw();t-=.2;s.textContent=`按 J / L 維持中央 ${Math.max(0,t).toFixed(1)} 秒`;if(v<=0||v>=100){run=0;s.textContent="80.html 失敗"}if(t<=0){run=0;s.textContent="80.html 完成"}},200);</script></body></html>
